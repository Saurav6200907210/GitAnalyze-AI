apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule

metadata:
  name: gitanalyze-alerts
  namespace: monitoring
  labels:
    release: monitoring

spec:
  groups:
    - name: gitanalyze.rules
      rules:

      - alert: BackendDown
        expr: absent(up{job="backend-service"})
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend Down"
          description: "GitAnalyze-AI backend is unreachable."

      - alert: BackendTargetDown
        expr: up{job="backend-service"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend Target Down"
          description: "Backend is being scraped but is not responding."

      - alert: HighCPUUsage
        expr: sum(rate(container_cpu_usage_seconds_total{namespace="gitanalyze-ai",container="backend"}[5m])) > 0.7
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High CPU Usage"
          description: "Backend CPU usage is above 70%."

      - alert: HighMemoryUsage
        expr: sum(container_memory_working_set_bytes{namespace="gitanalyze-ai",container="backend"}) > 500000000
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High Memory Usage"
          description: "Backend memory usage exceeded 500 MB."