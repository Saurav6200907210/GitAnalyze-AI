version: 2

updates:
  # Frontend
  - package-ecosystem: "npm"
    directory: "/frontend"

    schedule:
      interval: "weekly"

    open-pull-requests-limit: 5

    versioning-strategy: increase

    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  # Backend
  - package-ecosystem: "npm"
    directory: "/backend"

    schedule:
      interval: "weekly"

    open-pull-requests-limit: 5

    versioning-strategy: increase

    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"

    schedule:
      interval: "weekly"
