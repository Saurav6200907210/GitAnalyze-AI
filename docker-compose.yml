version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gitanalyze-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile   
    container_name: gitanalyze-backend
    ports:
      - "5000:5000"
    depends_on:
      - redis
    restart: always
  redis:
    image: redis:alpine
    container_name: gitport-redis
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redis_data:/data

volumes:
  redis_data:
