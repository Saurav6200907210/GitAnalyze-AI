apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend-deployment
  namespace: gitanalyze-ai

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend
          image: saurav6200/github-persona-main-backend:latest

          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
               name: backend-config

            - secretRef:
               name: backend-secret  